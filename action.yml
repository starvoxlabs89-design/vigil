name: "Kaali Security Scan"
description: "Open-source security scanner for AI agents, LLM apps & websites (prompt injection, MCP, secrets, Indian PII/DPDP)."
author: "Kaali"
branding:
  icon: "shield"
  color: "green"

inputs:
  target:
    description: "Target to scan (URL or local path). Defaults to the repo root."
    required: false
    default: "."
  ai-endpoint:
    description: "Optional LLM endpoint to probe for direct prompt injection."
    required: false
  ai-indirect-endpoint:
    description: "Optional LLM endpoint to probe for INDIRECT prompt injection (poisoned retrieved content)."
    required: false
  mcp-url:
    description: "Optional deployed MCP server URL to test for no-auth exposure + tool poisoning."
    required: false
  mcp-discover:
    description: "Set 'true' to discover & flag risky local MCP configs."
    required: false
    default: "false"
  only:
    description: "Comma-separated scanner ids to run (web,content,secrets,pii,ai,ai-indirect,mcp,mcp-discover)."
    required: false
  fail-on:
    description: "Exit with non-zero if any finding >= this severity (critical|high|medium|low)."
    required: false
    default: "high"
  upload-sarif:
    description: "Upload SARIF to GitHub code-scanning (requires security-events: write)."
    required: false
    default: "true"
  sarif-file:
    description: "Path for the SARIF output file."
    required: false
    default: "kaali.sarif"

outputs:
  sarif-file:
    description: "Path to the generated SARIF report."
    value: ${{ inputs.sarif-file }}

runs:
  using: "composite"
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"

    - name: Run Kaali
      shell: bash
      env:
        KAALI_TARGET: ${{ inputs.target }}
        KAALI_AI: ${{ inputs.ai-endpoint }}
        KAALI_AI_INDIRECT: ${{ inputs.ai-indirect-endpoint }}
        KAALI_MCP: ${{ inputs.mcp-url }}
        KAALI_DISCOVER: ${{ inputs.mcp-discover }}
        KAALI_ONLY: ${{ inputs.only }}
        KAALI_FAIL_ON: ${{ inputs.fail-on }}
        KAALI_SARIF: ${{ inputs.sarif-file }}
      run: |
        set -e
        ARGS=("scan" "$KAALI_TARGET")
        [ -n "$KAALI_AI" ]          && ARGS+=("--ai" "$KAALI_AI")
        [ -n "$KAALI_AI_INDIRECT" ] && ARGS+=("--ai-indirect" "$KAALI_AI_INDIRECT")
        [ -n "$KAALI_MCP" ]         && ARGS+=("--mcp" "$KAALI_MCP")
        [ "$KAALI_DISCOVER" = "true" ] && ARGS+=("--mcp-discover")
        [ -n "$KAALI_ONLY" ]        && ARGS+=("--only" "$KAALI_ONLY")
        [ -n "$KAALI_FAIL_ON" ]     && ARGS+=("--fail-on" "$KAALI_FAIL_ON")

        # Human-readable run (always shown in the job log; never fails the step on its own)
        npx -y kaali "${ARGS[@]}" || true

        # SARIF run (the actual gate — exits non-zero per --fail-on)
        npx -y kaali "${ARGS[@]}" --sarif > "$KAALI_SARIF"
        KAALI_EXIT=$?
        echo "kaali-exit=$KAALI_EXIT" >> "$GITHUB_OUTPUT" || true
        exit $KAALI_EXIT

    - name: Upload SARIF to GitHub code-scanning
      if: always() && inputs.upload-sarif == 'true'
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ inputs.sarif-file }}
        category: kaali
