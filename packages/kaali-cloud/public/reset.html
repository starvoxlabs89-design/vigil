<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Kaali — reset password</title>
<link rel="stylesheet" href="/style-inherit.css" onerror="this.remove()">
<style>
  body{margin:0;background:#0a0c10;color:#e6edf3;font-family:Inter,system-ui,sans-serif;min-height:100vh}
  .wrap{max-width:420px;margin:0 auto;padding:80px 24px}
  h1{font-size:22px;margin:0 0 20px}
  input{width:100%;background:#0b0e13;border:1px solid #222a36;border-radius:10px;color:#e6edf3;padding:11px 12px;font:inherit;font-size:14px;margin-bottom:14px}
  button{width:100%;font:inherit;font-weight:600;padding:12px;border-radius:10px;border:none;background:linear-gradient(135deg,#5eead4,#38bdf8);color:#04201c;cursor:pointer}
  .msg{margin-top:12px;font-size:13px;padding:10px;border-radius:8px}
  .err{color:#f87171;background:#1a0e10} .ok{color:#34d399;background:#06140f}
</style>
</head>
<body>
<div class="wrap">
  <h1>Reset your Kaali password</h1>
  <form id="f">
    <input id="pw" type="password" placeholder="New password (min 8)" minlength="8" required>
    <button type="submit">Set new password</button>
  </form>
  <div id="msg"></div>
</div>
<script>
const tok = new URLSearchParams(location.search).get('tok');
const $ = id => document.getElementById(id);
if (!tok) $('msg').innerHTML = '<div class="msg err">Missing reset token.</div>';
$('f').addEventListener('submit', async (e) => {
  e.preventDefault();
  const r = await fetch('/auth/reset', {method:'POST', headers:{'content-type':'application/json'}, body: JSON.stringify({tok, password: $('pw').value})});
  const j = await r.json().catch(()=>({}));
  if (r.ok){ $('msg').innerHTML = '<div class="msg ok">Password reset. <a href="/" style="color:#38bdf8">Sign in →</a></div>'; }
  else $('msg').innerHTML = `<div class="msg err">${j.error || 'Failed'}</div>`;
});
</script>
</body>
</html>
