    <style>

      * { margin: 0; padding: 0; box-sizing: border-box; }

        opacity: 0; animation: fade 1.6s ease 0.4s forwards;
      }
      .brand span { color: var(--gold); }

      .headline {
        position: absolute; left: 48px; bottom: 96px; max-width: 620px;

      }
      .headline p {
        margin-top: 22px; font-size: 15px; line-height: 1.6;
        color: #a7a496; max-width: 440px; font-weight: 400;
      }

      .nak {
        position: absolute; right: 48px; bottom: 96px; text-align: right;
        opacity: 0; animation: fade 1.8s ease 1.3s forwards;

      }

      .loader .ring {
