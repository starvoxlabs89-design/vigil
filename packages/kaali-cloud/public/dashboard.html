<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Kaali — dashboard</title>
<style>
  :root{
    --bg:#0a0c10; --panel:#11151c; --panel2:#161b24; --line:#222a36;
    --text:#e6edf3; --dim:#8b97a6; --accent:#5eead4; --accent2:#38bdf8;
    --crit:#f87171; --high:#fb923c; --med:#fbbf24; --ok:#34d399;
    --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,-apple-system,system-ui,sans-serif}
  header{border-bottom:1px solid var(--line);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:700}
  .brand .dot{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:grid;place-items:center;color:#04201c;font-size:14px}
  .user{color:var(--dim);font-size:13px;display:flex;align-items:center;gap:14px}
  .user a{color:var(--dim);text-decoration:underline;cursor:pointer}
  main{max-width:1080px;margin:0 auto;padding:28px 24px 80px}
  h1{font-size:24px;margin:0 0 6px}
  .sub{color:var(--dim);font-size:14px;margin-bottom:22px}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:22px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
  .stat .label{font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:var(--dim);margin-bottom:6px}
  .stat .val{font-family:var(--mono);font-size:24px;font-weight:700}
  .card{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:16px}
  .card h2{margin:0 0 12px;font-size:16px}
  .keyrow{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line);gap:10px;font-size:14px}
  .keyrow:last-child{border-bottom:none}
  .keyrow .prefix{font-family:var(--mono);color:var(--dim)}
  .keyrow .used{color:var(--dim);font-size:12px}
  button{font:inherit;font-weight:600;border-radius:10px;padding:9px 14px;border:1px solid var(--line);background:var(--panel2);color:var(--text);cursor:pointer}
  button:hover{border-color:var(--accent2)}
  button.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#04201c;border:none}
  button.danger{color:var(--crit)}
  .reveal{margin-top:10px;padding:10px 12px;background:#04201c;border:1px dashed var(--accent);border-radius:8px;
    color:var(--accent);font-family:var(--mono);font-size:13px;word-break:break-all}
  .empty{color:var(--dim);font-size:14px;padding:8px 0}
  .evt{display:grid;grid-template-columns:110px 1fr auto;gap:12px;padding:10px 0;border-bottom:1px solid var(--line);font-size:14px;align-items:center}
  .evt:last-child{border-bottom:none}
  .evt .when{color:var(--dim);font-size:12px;font-family:var(--mono)}
  .evt .tgt{font-family:var(--mono);color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .tag{font-family:var(--mono);font-size:11px;padding:2px 7px;border-radius:6px;text-transform:uppercase}
  .tag.cli{background:#0c1f2a;color:var(--accent2)}
  .tag.guard{background:#1a1230;color:#a78bfa}
  .score{font-family:var(--mono);font-weight:700}
  code{background:#0b0e13;border:1px solid var(--line);padding:1px 6px;border-radius:6px;font-family:var(--mono);font-size:12px}
  a{color:var(--accent2)}
</style>
</head>
<body>
<header>
  <div class="brand"><span class="dot">॥</span> Kaali</div>
  <div class="user">
    <span id="who">—</span>
    <a id="logout">Sign out</a>
  </div>
</header>
<main>
  <h1>Welcome back.</h1>
  <div class="sub">All Kaali events from your CLI scans and vigil-guard runtime, in one place.</div>

  <div class="grid" id="stats"></div>

  <div class="card">
    <h2>API keys <span style="color:var(--dim);font-weight:400;font-size:13px">— paste into the CLI or guard <code>onEvent</code></span></h2>
    <div id="keys"></div>
    <div style="margin-top:12px;display:flex;gap:8px;align-items:center">
      <input id="keyName" placeholder="key name (e.g. 'CI runner')" style="flex:1;background:#0b0e13;border:1px solid var(--line);border-radius:10px;color:var(--text);padding:9px 12px;font-family:inherit;font-size:14px">
      <button class="primary" id="newKey">Create key</button>
    </div>
    <div id="newKeyOut"></div>
  </div>

  <div class="card">
    <h2>Recent events</h2>
    <div id="events"></div>
  </div>

  <div class="card" style="border-color:#3a1414">
    <h2 style="color:var(--crit)">Danger zone — DPDP right to erasure</h2>
    <div class="sub" style="margin-bottom:10px">Delete your account and all associated data. This is irreversible.</div>
    <button class="danger" id="erase">Delete my account</button>
  </div>
</main>

<script>
const API = window.KAALI_API_URL || "";
const $ = id => document.getElementById(id);
const j = (u, o={}) => fetch(`${API}${u}`, {credentials:'include', ...o}).then(async r=>{const b=await r.json().catch(()=>({}));if(!r.ok) throw Object.assign(new Error(b.error||r.status),{status:r.status,body:b});return b;});
const fmt = (t) => t ? new Date(t).toLocaleString() : "—";

async function boot(){
  try {
    const me = await j('/me');
    $('who').textContent = me.email + '  ·  ' + me.plan;
  } catch (e){
    location.href = '/'; return;
  }
  await refreshAll();
}

async function refreshAll(){
  const [s, keys, evts] = await Promise.all([ j('/me/stats'), j('/me/keys'), j('/me/events?limit=50') ]);
  renderStats(s);
  renderKeys(keys.keys);
  renderEvents(evts.events);
}

function renderStats(s){
  const rows = [
    ["Scans (30d)", s.scans_30d ?? 0],
    ["Guard events (30d)", s.guard_events_30d ?? 0],
    ["Guard blocks (30d)", s.guard_blocks_30d ?? 0],
    ["Avg Kaali Score", s.avg_score_30d != null ? s.avg_score_30d + "/100" : "—"],
  ];
  $('stats').innerHTML = rows.map(([l,v]) => `<div class="stat"><div class="label">${l}</div><div class="val">${v}</div></div>`).join('');
}
function renderKeys(keys){
  const el = $('keys');
  if (!keys.length){ el.innerHTML = '<div class="empty">No keys yet. Create one to stream events from your CLI or guard.</div>'; return; }
  el.innerHTML = keys.map(k => `
    <div class="keyrow">
      <div>
        <div>${escapeHtml(k.name)}</div>
        <div class="used">created ${fmt(k.created_at)} · last used ${fmt(k.last_used_at)} ${k.revoked_at ? '· <span style="color:var(--crit)">revoked</span>' : ''}</div>
      </div>
      <div class="prefix">${escapeHtml(k.prefix)}…</div>
      ${k.revoked_at ? '' : `<button data-revoke="${k.id}">Revoke</button>`}
    </div>
  `).join('');
  el.querySelectorAll('[data-revoke]').forEach(b => b.onclick = async () => {
    if (!confirm('Revoke this key?')) return;
    await j(`/me/keys/${b.dataset.revoke}/revoke`, {method:'POST'});
    refreshAll();
  });
}
function renderEvents(evts){
  const el = $('events');
  if (!evts.length){ el.innerHTML = '<div class="empty">No events yet. Run <code>kaali scan</code> with your key, or wire <code>onEvent</code> in kaali-guard.</div>'; return; }
  el.innerHTML = evts.map(e => {
    const isCli = e.source === 'cli';
    const summary = isCli
      ? `${(e.payload && e.payload.findings ? e.payload.findings.length : 0)} findings`
      : `${e.payload?.direction || 'event'}${e.payload?.blocked ? ' — blocked' : ''}${e.payload?.reason ? ' (' + e.payload.reason + ')' : ''}`;
    const scoreCol = e.score == null ? "" : e.score >= 80 ? "var(--ok)" : e.score >= 50 ? "var(--med)" : "var(--crit)";
    return `<div class="evt">
      <div class="when">${fmt(e.created_at)}</div>
      <div>
        <span class="tag ${e.source}">${e.source}</span>
        <span class="tgt">${escapeHtml(e.target || '')}</span>
        <div style="color:var(--dim);font-size:12px">${escapeHtml(summary)}</div>
      </div>
      <div class="score" style="color:${scoreCol}">${e.score != null ? e.score : ''}</div>
    </div>`;
  }).join('');
}

$('newKey').onclick = async () => {
  const name = $('keyName').value.trim() || 'default';
  const k = await j('/me/keys', {method:'POST', headers:{'content-type':'application/json'}, body: JSON.stringify({name})});
  $('newKeyOut').innerHTML = `<div class="reveal">${escapeHtml(k.key)}<br><span style="color:var(--dim)">Save this now — it won't be shown again.</span></div>`;
  $('keyName').value = '';
  refreshAll();
};

$('logout').onclick = async () => { await j('/auth/logout', {method:'POST'}).catch(()=>{}); location.href='/'; };
$('erase').onclick = async () => {
  if (!confirm('Really delete your account and ALL your data? This cannot be undone.')) return;
  await j('/me', {method:'DELETE'}).catch(()=>{});
  location.href = '/';
};

function escapeHtml(s){ return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

boot();
</script>
</body>
</html>
