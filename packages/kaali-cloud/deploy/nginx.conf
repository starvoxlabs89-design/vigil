# /etc/nginx/sites-available/kaali.conf
# Serves kaali.io (primary), app.kaali.io (alias), api.kaali.io (alias) —
# all proxy to the same Node process on 127.0.0.1:4842.
# TLS via certbot: sudo certbot --nginx -d kaali.io -d www.kaali.io -d app.kaali.io -d api.kaali.io

# Reusable security-header block. Apply per server so certbot doesn't strip it.
# NOTE: CSP allows 'unsafe-inline' for style/script — required by our
# single-file HTML pages. Tighten to hashes/nonces once we split assets.
map "" $kaali_csp {
    default "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'";
}

# www.kaali.io → kaali.io (301)
server {
    listen 443 ssl http2;
    server_name www.kaali.io;
    return 301 https://kaali.io$request_uri;
}

# Primary + aliases — same backend
server {
    listen 443 ssl http2;
    server_name kaali.io app.kaali.io api.kaali.io;

    server_tokens off;
    client_max_body_size 1M;
    proxy_read_timeout 30s;

    # --- Security headers ---
    add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy    $kaali_csp always;
    add_header X-Frame-Options            "DENY" always;
    add_header X-Content-Type-Options     "nosniff" always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    location / {
        proxy_pass         http://127.0.0.1:4842;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# Force HTTPS on all four hosts
server {
    listen 80;
    server_name kaali.io www.kaali.io app.kaali.io api.kaali.io;
    return 301 https://$host$request_uri;
}
