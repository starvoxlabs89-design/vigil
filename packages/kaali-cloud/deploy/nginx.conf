# /etc/nginx/sites-available/kaali.conf
# Proxy api.kaali.io + app.kaali.io. TLS via certbot / cloudflare origin cert.

server {
    listen 443 ssl http2;
    server_name api.kaali.io;
    # ssl_certificate /etc/letsencrypt/live/api.kaali.io/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.kaali.io/privkey.pem;

    client_max_body_size 1M;
    proxy_read_timeout 30s;

    location / {
        proxy_pass         http://127.0.0.1:4842;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# The dashboard is served from the same Node process (public/ static assets).
# If you want to split later, put app.kaali.io on Cloudflare Pages and point
# its API base URL at api.kaali.io — the code already supports CORS + creds.
server {
    listen 443 ssl http2;
    server_name app.kaali.io;
    # ssl_certificate /etc/letsencrypt/live/app.kaali.io/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/app.kaali.io/privkey.pem;

    location / {
        proxy_pass         http://127.0.0.1:4842;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# Force HTTPS
server {
    listen 80;
    server_name api.kaali.io app.kaali.io;
    return 301 https://$host$request_uri;
}
