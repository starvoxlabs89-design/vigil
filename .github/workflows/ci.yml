name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: kaali list
        run: node bin/kaali.js list
      - name: scan self (text)
        run: node bin/kaali.js scan . --only secrets,pii
      - name: scan self (sarif)
        run: node bin/kaali.js scan . --only secrets,pii --sarif > kaali.sarif
      - name: validate sarif is parseable
        run: node -e "const j=JSON.parse(require('fs').readFileSync('kaali.sarif','utf8')); if(j.version!=='2.1.0') throw new Error('bad sarif')"
